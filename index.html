<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ワードウルフ オンライン</title>
<style>
:root{
  --bg:#14151a; --bg2:#1c1e26; --card:#21232d; --card2:#272a36;
  --text:#f0f1f5; --sub:#9a9db0; --accent:#6c5ce7; --accent2:#a29bfe;
  --danger:#ff5e62; --ok:#2ecc71; --warn:#f1c40f; --border:#33364233;
  --radius:16px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",sans-serif;
  background:linear-gradient(160deg,var(--bg),var(--bg2));
  color:var(--text); min-height:100vh; -webkit-tap-highlight-color:transparent;
}
#app{max-width:640px;margin:0 auto;padding:20px 16px 60px;min-height:100vh;}
h1{font-size:22px;font-weight:700;margin:6px 0 2px;display:flex;align-items:center;gap:8px;}
h1 .badge{font-size:11px;background:var(--accent);color:#fff;padding:2px 8px;border-radius:20px;font-weight:600;}
.subtitle{color:var(--sub);font-size:13px;margin-bottom:18px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.card h2{font-size:15px;margin:0 0 12px;color:var(--accent2);font-weight:700;display:flex;align-items:center;gap:6px;}
label{font-size:13px;color:var(--sub);display:block;margin-bottom:6px;margin-top:14px;}
label:first-of-type{margin-top:0;}
input[type=text],input[type=number],select{
  width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);
  border-radius:10px;padding:11px 12px;font-size:15px;outline:none;transition:border .15s;
}
input:focus,select:focus{border-color:var(--accent);}
input.code-input{font-size:22px;letter-spacing:4px;text-align:center;font-weight:800;text-transform:uppercase;}
.row{display:flex;gap:10px;}
.row>*{flex:1;}
.stepper{display:flex;align-items:center;gap:10px;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:4px;}
.stepper button{width:38px;height:38px;border-radius:8px;border:none;background:var(--card);color:var(--text);font-size:18px;font-weight:700;cursor:pointer;}
.stepper button:active{background:var(--accent);}
.stepper .val{flex:1;text-align:center;font-size:18px;font-weight:700;}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.chip{padding:8px 14px;border-radius:20px;background:var(--card2);border:1px solid var(--border);font-size:13px;cursor:pointer;color:var(--sub);user-select:none;transition:.15s;}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600;}
.btn{display:block;width:100%;text-align:center;padding:15px;border-radius:12px;border:none;font-size:16px;font-weight:700;cursor:pointer;color:#fff;background:var(--accent);transition:transform .1s, opacity .1s;}
.btn:active{transform:scale(0.97);}
.btn.secondary{background:var(--card2);color:var(--text);border:1px solid var(--border);}
.btn.danger{background:var(--danger);}
.btn.ghost{background:transparent;color:var(--sub);border:1px solid var(--border);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-row{display:flex;gap:10px;margin-top:14px;}
.btn-row>*{flex:1;}
.center{text-align:center;}
.hint{font-size:12px;color:var(--sub);margin-top:8px;line-height:1.6;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.iconbtn{width:36px;height:36px;border-radius:10px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--sub);flex-shrink:0;}

.room-code-box{background:linear-gradient(145deg,#2a2440,#332a52);border-radius:18px;padding:22px;text-align:center;margin-bottom:14px;}
.room-code-box .label{font-size:12px;color:var(--accent2);margin-bottom:6px;}
.room-code-box .code{font-size:36px;font-weight:800;letter-spacing:6px;}
.copy-row{display:flex;gap:8px;margin-top:14px;}
.copy-row .btn{margin:0;}

.player-chip{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card2);border-radius:12px;margin-bottom:8px;}
.player-chip .avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.player-chip .pname{font-weight:600;flex:1;}
.player-chip .host-tag{font-size:11px;color:var(--warn);font-weight:700;}
.player-chip .me-tag{font-size:11px;color:var(--accent2);font-weight:700;}

.flip-card{width:100%;max-width:340px;aspect-ratio:3/4;border-radius:24px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;perspective:1000px;margin:0 auto;}
.flip-card .face{position:absolute;inset:0;border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;backface-visibility:hidden;transition:transform .5s;padding:20px;}
.flip-card .front{background:linear-gradient(145deg,var(--card),var(--card2));}
.flip-card .back{transform:rotateY(180deg);background:linear-gradient(145deg,#2a2440,#332a52);}
.flip-card.flipped .front{transform:rotateY(180deg);}
.flip-card.flipped .back{transform:rotateY(360deg);}
.flip-card .icon{font-size:36px;opacity:.5;}
.word-display{font-size:28px;font-weight:800;letter-spacing:1px;text-align:center;}
.cat-tag{font-size:12px;color:var(--accent2);background:#6c5ce71f;padding:4px 10px;border-radius:20px;}
.warn-text{font-size:12px;color:var(--warn);max-width:260px;text-align:center;}

.timer-display{font-size:54px;font-weight:800;text-align:center;font-family:monospace;letter-spacing:2px;margin:10px 0;}
.timer-display.urgent{color:var(--danger);}
.progress-bar{height:8px;border-radius:10px;background:var(--card2);overflow:hidden;margin-bottom:6px;}
.progress-bar .fill{height:100%;background:var(--accent);transition:width 1s linear,background .3s;}
.progress-bar .fill.urgent{background:var(--danger);}

.vote-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px;}
.vote-option{padding:16px 8px;border-radius:14px;background:var(--card2);border:2px solid var(--border);text-align:center;font-weight:700;cursor:pointer;font-size:15px;}
.vote-option.selected{border-color:var(--accent);background:#6c5ce71f;color:var(--accent2);}

.result-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
.result-row:last-child{border-bottom:none;}
.result-row .name{font-weight:700;}
.tag-wolf{color:var(--danger);font-weight:700;font-size:12px;background:#ff5e6222;padding:3px 10px;border-radius:20px;}
.tag-citizen{color:var(--accent2);font-weight:700;font-size:12px;background:#6c5ce722;padding:3px 10px;border-radius:20px;}
.tag-word{color:var(--sub);font-size:13px;}
.result-banner{text-align:center;padding:22px;border-radius:18px;margin-bottom:16px;font-size:18px;font-weight:800;}
.result-banner.win{background:#2ecc7122;color:var(--ok);}
.result-banner.lose{background:#ff5e6222;color:var(--danger);}
.status-pill{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;background:var(--card2);color:var(--sub);margin-bottom:10px;}
.empty{text-align:center;color:var(--sub);font-size:13px;padding:20px 0;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
@media (min-width:560px){ .vote-grid{grid-template-columns:repeat(3,1fr);} }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ===================== お題データ ===================== */
const TOPICS = {
  "定番": [["寿司","ラーメン"],["犬","猫"],["夏","冬"],["コーヒー","紅茶"],["海","山"],
    ["スマホ","パソコン"],["映画館","遊園地"],["先生","医者"],["朝","夜"],["電車","バス"],
    ["カレー","シチュー"],["雨","雪"],["サッカー","野球"]],
  "ご当地・旅行": [["東京","大阪"],["温泉","サウナ"],["国内旅行","海外旅行"],["飛行機","新幹線"],
    ["ホテル","旅館"],["地図","ナビ"],["山登り","ハイキング"]],
  "ちょっと難しい": [["正義","正解"],["孤独","自由"],["努力","才能"],["友達","知り合い"],
    ["夢","目標"],["幸せ","満足"],["勇気","無謀"]],
  "食べ物": [["焼肉","しゃぶしゃぶ"],["うどん","そば"],["ケーキ","クッキー"],
    ["アイス","かき氷"],["唐揚げ","天ぷら"],["パン","ご飯"]]
};
const CAT_NAMES = Object.keys(TOPICS);

/* ===================== ローカル状態 ===================== */
let myId = null;          // このブラウザのプレイヤーID
let myName = "";
let roomCode = null;
let room = null;          // 直近取得したルームの状態(キャッシュ)
let pollTimer = null;
let screen = "home";      // home / create / join / lobby_or_game(roomに同期)
let voteSelection = null;
let errorMsg = "";

const app = document.getElementById("app");

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 1800);
}
function genId(){ return "p_" + Math.random().toString(36).slice(2,10); }
function genRoomCode(){
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s=""; for(let i=0;i<5;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function escapeHtml(str){
  if(str===undefined||str===null) return "";
  return String(str).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function formatTime(s){
  s = Math.max(0, Math.round(s));
  const m = Math.floor(s/60), sec = s%60;
  return `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

/* ===================== ストレージ操作 ===================== */
async function getRoom(code){
  try{
    const res = await window.storage.get("room:"+code, true);
    return res ? JSON.parse(res.value) : null;
  }catch(e){ return null; }
}
async function setRoom(code, data){
  data.updatedAt = Date.now();
  try{
    await window.storage.set("room:"+code, JSON.stringify(data), true);
    return true;
  }catch(e){ return false; }
}

/* ===================== 起動時 ===================== */
(async function init(){
  try{
    const params = new URLSearchParams(window.location.search);
    const r = params.get("room");
    if(r){ roomCode = r.toUpperCase(); screen = "join"; }
  }catch(e){}
  myId = genId();
  render();
})();

/* ===================== ポーリング ===================== */
function startPolling(){
  stopPolling();
  pollTimer = setInterval(async ()=>{
    if(!roomCode) return;
    const fresh = await getRoom(roomCode);
    if(fresh){
      room = fresh;
      render();
    }
  }, 1500);
}
function stopPolling(){
  if(pollTimer){ clearInterval(pollTimer); pollTimer=null; }
}

/* ===================== 描画ルーター ===================== */
function render(){
  let html = "";
  if(screen==="home") html = renderHome();
  else if(screen==="create") html = renderCreate();
  else if(screen==="join") html = renderJoin();
  else if(room){
    if(room.status==="lobby") html = renderLobby();
    else if(room.status==="playing") html = renderGame();
    else if(room.status==="result") html = renderResultScreen();
  } else {
    html = `<div class="empty">読み込み中...</div>`;
  }
  app.innerHTML = html;
}

/* ---------- HOME ---------- */
function renderHome(){
  stopPolling();
  return `
  <h1>🐺 ワードウルフ <span class="badge">オンライン</span></h1>
  <p class="subtitle">リンクを送るだけで、それぞれの端末からそのまま参加できます。</p>
  <div class="card">
    <h2>🎲 新しい部屋を作る</h2>
    <p class="hint">あなたがホストになり、招待コード(リンク)が発行されます。</p>
    <button class="btn" onclick="screen='create';render()">部屋を作成</button>
  </div>
  <div class="card">
    <h2>🔑 部屋に参加する</h2>
    <p class="hint">招待された5桁のコードを入力して参加します。</p>
    <button class="btn secondary" onclick="screen='join';render()">コードで参加</button>
  </div>
  `;
}

/* ---------- CREATE ---------- */
function renderCreate(){
  return `
  <div class="topbar">
    <div class="iconbtn" onclick="screen='home';render()">←</div>
    <h1 style="font-size:18px;">部屋を作成</h1><div></div>
  </div>
  <div class="card">
    <label>あなたの名前</label>
    <input type="text" id="hostName" placeholder="例: たかし" maxlength="12">
    <button class="btn" style="margin-top:16px;" onclick="createRoom()">作成して進む</button>
    ${errorMsg? `<p class="hint" style="color:var(--danger);">${escapeHtml(errorMsg)}</p>`:""}
  </div>
  `;
}
async function createRoom(){
  const name = document.getElementById("hostName").value.trim();
  if(!name){ errorMsg="名前を入力してください"; render(); return; }
  myName = name;
  let code = genRoomCode();
  // 衝突回避(簡易)
  let exists = await getRoom(code);
  let tries=0;
  while(exists && tries<5){ code=genRoomCode(); exists=await getRoom(code); tries++; }

  room = {
    code, hostId: myId, status:"lobby", round:0,
    settings:{ wolfCount:1, categories:["定番"], timerSeconds:180 },
    players:[{id:myId, name:myName, joinedAt:Date.now()}],
    assignment:null, phase:null, discussEndAt:null, votes:{}
  };
  roomCode = code;
  const ok = await setRoom(code, room);
  if(!ok){ errorMsg="部屋の作成に失敗しました。通信環境を確認してください"; render(); return; }
  errorMsg="";
  startPolling();
  render();
}

/* ---------- JOIN ---------- */
function renderJoin(){
  return `
  <div class="topbar">
    <div class="iconbtn" onclick="screen='home';roomCode=null;render()">←</div>
    <h1 style="font-size:18px;">部屋に参加</h1><div></div>
  </div>
  <div class="card">
    <label>招待コード</label>
    <input type="text" id="joinCode" class="code-input" maxlength="5" placeholder="ABCDE" value="${escapeHtml(roomCode||'')}">
    <label>あなたの名前</label>
    <input type="text" id="joinName" placeholder="例: ゆうこ" maxlength="12">
    <button class="btn" style="margin-top:16px;" onclick="joinRoom()">参加する</button>
    ${errorMsg? `<p class="hint" style="color:var(--danger);">${escapeHtml(errorMsg)}</p>`:""}
  </div>
  `;
}
async function joinRoom(){
  const code = document.getElementById("joinCode").value.trim().toUpperCase();
  const name = document.getElementById("joinName").value.trim();
  if(!code || code.length<4){ errorMsg="コードを入力してください"; render(); return; }
  if(!name){ errorMsg="名前を入力してください"; render(); return; }
  const existing = await getRoom(code);
  if(!existing){ errorMsg="その部屋は見つかりませんでした"; render(); return; }
  if(existing.status!=="lobby"){
    // 進行中でも観戦的に再参加は許可しない簡易仕様
    if(!existing.players.some(p=>p.id===myId)){
      errorMsg="このゲームはすでに開始されています"; render(); return;
    }
  }
  myName = name;
  if(!existing.players.some(p=>p.id===myId)){
    existing.players.push({id:myId, name:myName, joinedAt:Date.now()});
    await setRoom(code, existing);
  }
  room = existing;
  roomCode = code;
  errorMsg="";
  startPolling();
  render();
}

/* ---------- LOBBY ---------- */
function isHost(){ return room && room.hostId===myId; }
function shareLink(){
  try{
    const url = new URL(window.location.href);
    url.searchParams.set("room", roomCode);
    return url.toString();
  }catch(e){ return window.location.href; }
}
function renderLobby(){
  const host = isHost();
  const n = room.players.length;
  return `
  <h1>🐺 ワードウルフ <span class="badge">待機中</span></h1>
  <div class="room-code-box">
    <div class="label">招待コード</div>
    <div class="code">${roomCode}</div>
    <div class="copy-row">
      <button class="btn secondary" onclick="copyCode()">コードをコピー</button>
      <button class="btn" onclick="copyLink()">リンクをコピー</button>
    </div>
    <p class="hint">このアーティファクトを共有した上で、コードかリンクを友達に送ってください。</p>
  </div>

  <div class="card">
    <h2>👥 参加者 (${n}人)</h2>
    ${room.players.map(p=>`
      <div class="player-chip">
        <div class="avatar">${escapeHtml((p.name||"?").slice(0,1))}</div>
        <div class="pname">${escapeHtml(p.name)}</div>
        ${p.id===room.hostId? `<span class="host-tag">ホスト</span>`:""}
        ${p.id===myId? `<span class="me-tag">あなた</span>`:""}
      </div>
    `).join("")}
    ${n<3? `<p class="hint">あと${3-n}人以上で開始できます。</p>`:""}
  </div>

  <div class="card">
    <h2>⚙ 設定 ${host? "":'<span class="status-pill">ホストのみ変更可</span>'}</h2>
    <label>ウルフ(少数派)の人数</label>
    <div class="stepper">
      <button ${host?"":"disabled"} onclick="adjustWolf(-1)">−</button>
      <div class="val">${room.settings.wolfCount}人</div>
      <button ${host?"":"disabled"} onclick="adjustWolf(1)">+</button>
    </div>
    <label>お題カテゴリ</label>
    <div class="chips">
      ${CAT_NAMES.map(c=>`<div class="chip ${room.settings.categories.includes(c)?'active':''}" ${host?`onclick="toggleCat('${c}')"`:''}>${c}</div>`).join("")}
    </div>
    <label>議論タイマー</label>
    <div class="stepper">
      <button ${host?"":"disabled"} onclick="adjustTimer(-30)">−30s</button>
      <div class="val">${formatTime(room.settings.timerSeconds)}</div>
      <button ${host?"":"disabled"} onclick="adjustTimer(30)">+30s</button>
    </div>
  </div>

  ${host?
    `<button class="btn" ${n<3?"disabled":""} onclick="startGame()">ゲーム開始 (${n}人)</button>`
    : `<div class="card center"><p class="hint">ホストがゲームを開始するまでお待ちください...</p></div>`}
  <button class="btn ghost" style="margin-top:10px;" onclick="leaveRoom()">退出する</button>
  `;
}
function copyCode(){
  navigator.clipboard.writeText(roomCode).then(()=>showToast("コードをコピーしました")).catch(()=>showToast("コピーに失敗しました"));
}
function copyLink(){
  navigator.clipboard.writeText(shareLink()).then(()=>showToast("リンクをコピーしました")).catch(()=>showToast("コピーに失敗しました"));
}
async function adjustWolf(d){
  if(!isHost()) return;
  const max = Math.max(1, room.players.length-2);
  room.settings.wolfCount = Math.min(max, Math.max(1, room.settings.wolfCount+d));
  await setRoom(roomCode, room);
  render();
}
async function toggleCat(c){
  if(!isHost()) return;
  const cats = room.settings.categories;
  if(cats.includes(c)){ if(cats.length>1) room.settings.categories = cats.filter(x=>x!==c); }
  else cats.push(c);
  await setRoom(roomCode, room);
  render();
}
async function adjustTimer(d){
  if(!isHost()) return;
  room.settings.timerSeconds = Math.max(30, Math.min(900, room.settings.timerSeconds+d));
  await setRoom(roomCode, room);
  render();
}
async function leaveRoom(){
  if(room){
    room.players = room.players.filter(p=>p.id!==myId);
    if(room.players.length===0){
      try{ await window.storage.delete("room:"+roomCode, true); }catch(e){}
    } else {
      if(room.hostId===myId) room.hostId = room.players[0].id;
      await setRoom(roomCode, room);
    }
  }
  stopPolling();
  room=null; roomCode=null; screen="home";
  render();
}

/* ---------- ゲーム開始(お題決め) ---------- */
async function startGame(){
  if(!isHost()) return;
  let pool = [];
  room.settings.categories.forEach(c=>{ (TOPICS[c]||[]).forEach(pair=>pool.push({pair,cat:c})); });
  if(pool.length===0){ showToast("お題カテゴリを選んでください"); return; }
  const pick = pool[Math.floor(Math.random()*pool.length)];
  let [w1,w2] = pick.pair;
  if(Math.random()<0.5) [w1,w2]=[w2,w1];

  const ids = room.players.map(p=>p.id);
  shuffle(ids);
  const wolfCount = Math.min(room.settings.wolfCount, ids.length-2);
  const wolves = ids.slice(0, wolfCount);

  room.assignment = { citizenWord:w1, wolfWord:w2, category:pick.cat, wolfIds:wolves };
  room.status = "playing";
  room.phase = "reveal";
  room.discussEndAt = null;
  room.votes = {};
  room.round = (room.round||0)+1;
  await setRoom(roomCode, room);
  render();
}

/* ---------- GAME (reveal/discuss/vote) ---------- */
function renderGame(){
  if(room.phase==="reveal") return renderReveal();
  if(room.phase==="discuss") return renderDiscuss();
  if(room.phase==="vote") return renderVotePhase();
  return `<div class="empty">読み込み中...</div>`;
}
function renderReveal(){
  const isWolf = room.assignment.wolfIds.includes(myId);
  const word = isWolf ? room.assignment.wolfWord : room.assignment.citizenWord;
  return `
  <h1>🃏 自分のお題を確認</h1>
  <p class="subtitle">他の人に画面を見られないように注意してください。</p>
  <div class="flip-card" id="flipCard" onclick="document.getElementById('flipCard').classList.add('flipped')">
    <div class="face front"><div class="icon">🃏</div><div style="font-weight:700;">タップしてお題を見る</div></div>
    <div class="face back">
      <div class="cat-tag">${escapeHtml(room.assignment.category)}</div>
      <div class="word-display">${escapeHtml(word)}</div>
      <div class="warn-text">声に出さず、自分のお題として覚えておきましょう</div>
    </div>
  </div>
  ${isHost()? `
    <div class="card" style="margin-top:18px;">
      <h2>⏱ 全員が確認したら議論開始</h2>
      <p class="hint">他のメンバーがお題を確認したか、口頭で確認してから始めてください。</p>
      <button class="btn" onclick="beginDiscuss()">議論タイマーを開始</button>
    </div>
  ` : `<p class="hint center" style="margin-top:14px;">ホストが議論タイマーを開始するまでお待ちください...</p>`}
  `;
}
async function beginDiscuss(){
  if(!isHost()) return;
  room.phase = "discuss";
  room.discussEndAt = Date.now() + room.settings.timerSeconds*1000;
  await setRoom(roomCode, room);
  render();
}
function renderDiscuss(){
  const remain = Math.max(0, (room.discussEndAt - Date.now())/1000);
  const pct = Math.max(0, Math.round(remain/room.settings.timerSeconds*100));
  const urgent = remain<=15;
  if(!window.__discussTickStarted){
    window.__discussTickStarted = true;
    window.__discussTick = setInterval(()=>{
      if(!room || room.phase!=="discuss"){ clearInterval(window.__discussTick); window.__discussTickStarted=false; return; }
      const el = document.getElementById("liveTimer");
      if(!el){ return; }
      const rem = Math.max(0,(room.discussEndAt-Date.now())/1000);
      el.textContent = formatTime(rem);
      el.classList.toggle("urgent", rem<=15);
      const fb = document.getElementById("liveFill");
      if(fb){ fb.style.width = Math.max(0,Math.round(rem/room.settings.timerSeconds*100))+"%"; fb.classList.toggle("urgent", rem<=15); }
    },1000);
  }
  return `
  <div class="card center">
    <h2 style="justify-content:center;">⏱ 議論タイム</h2>
    <p class="hint">お題を直接言わずに、会話でウルフを推理しましょう。</p>
    <div class="progress-bar"><div class="fill ${urgent?'urgent':''}" id="liveFill" style="width:${pct}%"></div></div>
    <div class="timer-display ${urgent?'urgent':''}" id="liveTimer">${formatTime(remain)}</div>
    ${isHost()? `<button class="btn" onclick="goVote()">投票へ進む</button>`
      : `<p class="hint">ホストが投票フェーズに進めます</p>`}
  </div>
  `;
}
async function goVote(){
  if(!isHost()) return;
  room.phase = "vote";
  room.votes = {};
  await setRoom(roomCode, room);
  render();
}
function renderVotePhase(){
  const others = room.players.filter(p=>p.id!==myId);
  const myVote = room.votes[myId];
  const votedCount = Object.keys(room.votes).length;
  const total = room.players.length;
  return `
  <h1>🗳 投票</h1>
  <p class="subtitle">誰がウルフだと思いますか?(${votedCount}/${total}人が投票済み)</p>
  <div class="card">
    <div class="vote-grid">
      ${others.map(p=>`
        <div class="vote-option ${myVote===p.id?'selected':''}" onclick="submitVote('${p.id}')">${escapeHtml(p.name)}</div>
      `).join("")}
    </div>
  </div>
  ${isHost()? `
    <button class="btn" ${votedCount<total? "" : ""} onclick="finishVote()">
      ${votedCount<total? `結果を見る(${total-votedCount}人未投票・強制終了)` : "結果を見る"}
    </button>
  `: `<p class="hint center">全員の投票が終わるとホストが結果を表示します</p>`}
  `;
}
async function submitVote(targetId){
  room.votes[myId] = targetId;
  await setRoom(roomCode, room);
  render();
}
async function finishVote(){
  if(!isHost()) return;
  room.status = "result";
  await setRoom(roomCode, room);
  render();
}

/* ---------- RESULT ---------- */
function renderResultScreen(){
  const tally = {};
  room.players.forEach(p=>tally[p.id]=0);
  Object.values(room.votes).forEach(t=>{ if(tally[t]!==undefined) tally[t]++; });
  let maxV=-1, top=[];
  Object.entries(tally).forEach(([id,v])=>{
    if(v>maxV){ maxV=v; top=[id]; } else if(v===maxV){ top.push(id); }
  });
  const wolves = room.assignment.wolfIds;
  const isTie = top.length>1;
  const caught = !isTie && wolves.includes(top[0]);

  return `
  <div class="result-banner ${caught? 'win':'lose'}">
    ${isTie? "投票が割れて決着つかず!" : caught? "🏆 市民チームの勝利!" : "🐺 ウルフチームの勝利..."}
  </div>
  <div class="card">
    <h2>お題</h2>
    <div class="result-row"><span class="tag-citizen">市民</span><span class="tag-word">${escapeHtml(room.assignment.citizenWord)}</span></div>
    <div class="result-row"><span class="tag-wolf">ウルフ</span><span class="tag-word">${escapeHtml(room.assignment.wolfWord)}</span></div>
    <p class="hint">カテゴリ: ${escapeHtml(room.assignment.category)}</p>
  </div>
  <div class="card">
    <h2>正体・得票</h2>
    ${room.players.map(p=>{
      const isWolf = wolves.includes(p.id);
      const v = tally[p.id]||0;
      return `<div class="result-row">
        <span class="name">${escapeHtml(p.name)} ${isWolf?'<span class="tag-wolf">ウルフ</span>':'<span class="tag-citizen">市民</span>'}</span>
        <span class="hint">${v}票</span>
      </div>`;
    }).join("")}
  </div>
  ${isHost()? `
    <div class="btn-row">
      <button class="btn secondary" onclick="backToLobby()">部屋に戻る</button>
      <button class="btn" onclick="startGame()">もう一度プレイ</button>
    </div>
  ` : `<p class="hint center">ホストが次のラウンドを開始するまでお待ちください...</p>`}
  <button class="btn ghost" style="margin-top:10px;" onclick="leaveRoom()">退出する</button>
  `;
}
async function backToLobby(){
  if(!isHost()) return;
  room.status="lobby"; room.phase=null; room.assignment=null; room.votes={}; room.discussEndAt=null;
  await setRoom(roomCode, room);
  render();
}
</script>
</body>
</html>
